set timeout=3
set default=0



insmod iso9660
insmod fat
insmod search_fs_file
search --no-floppy --file --set=root /boot/kernel.bin

set gfxmode=1024x768x32
set gfxpayload=keep

menuentry "Krypx v0.1 (GUI)" {
    insmod all_video
    insmod vbe
    insmod vga
    insmod gfxterm
    terminal_output gfxterm
    multiboot /boot/kernel.bin
    boot
}

menuentry "Krypx v0.1 (texto)" {
    multiboot /boot/kernel.bin nogumode=1
    boot
}
